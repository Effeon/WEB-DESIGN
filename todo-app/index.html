<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TO-DO App</title>

    <link rel="stylesheet" href="todo.css">
</head>
<body>
    
    <div class="container">

        <h1>To-Do App</h1>

        <!--INPUT SECTION-->

        <div class="input-section">

            <input type="text" 
            id="taskInput"
            placeholder="Enter a task">

            <button  id="addBtn">
                Add
            </button>
            
        </div>

        <!--TASK LIST-->

        <ul id="taskList">

        </ul>

    </div>

    <script src="todo.js"></script>
</body>
</html>
